<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Colectivos</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <style>
        body { padding: 0; margin: 0; }
        html, body, #mapa { height: 100%; width: 100%; }
    </style>
</head>
<body>

<div id="mapa"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
    // Inicializamos el mapa centrado en la zona de Madryn/Rawson (Zoom 12)
    var map = L.map('mapa').setView([-43.3002, -65.1023], 14);

    // Acá es donde nos conectamos a OpenStreetMap para bajar las imágenes de las calles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // --- FUNCIONES PARA EL PASO 3 (Preparando el terreno) ---

    // Función de prueba para ver si Java nos puede hablar
    function saludarDesdeJava(mensaje) {
        console.log("Java dice: " + mensaje);
        alert("El mapa recibió este mensaje de Java: " + mensaje);
    }

    // Esta variable va a guardar las líneas que dibujemos para poder borrarlas después
        var capaRutas = L.layerGroup().addTo(map);

    /**
    * Esta es la función clave que Java va a llamar.
    * Recibe un texto largo con las coordenadas y el color.
    * Formato esperado: "lat1,lng1;lat2,lng2;lat3,lng3|#ff5c00"
    * Dibuja la ruta llamando a OSRM para seguir el trayecto real de las calles.
    */
       function dibujarRutaDesdeJava(datosRuta) {
            var partes = datosRuta.split("|");
            var textoCoordenadas = partes[0];
            var colorRuta = partes[1];

            var pares = textoCoordenadas.split(";");
            var puntosLeaflet = []; // Para dibujar puntitos y fallback
            var osrmCoords = [];    // Para pedirle a la API (usa lng,lat)

            // 1. Armamos las listas de coordenadas
            for (var i = 0; i < pares.length; i++) {
                if (pares[i].trim() !== "") {
                    var latLng = pares[i].split(",");
                    var lat = parseFloat(latLng[0]);
                    var lng = parseFloat(latLng[1]);

                    puntosLeaflet.push([lat, lng]);
                    osrmCoords.push(lng + "," + lat); // OSRM requiere primero la longitud

                    // Dibujamos el puntito de la parada (tu código anterior)
                    var puntito = L.circleMarker([lat, lng], {
                        color: '#000000', fillColor: '#ffffff', fillOpacity: 1, radius: 4, weight: 2
                    });
                    capaRutas.addLayer(puntito);
                }
            }

            // 2. MAGIA DE OSRM: Detectamos si es caminando o en colectivo
            var perfil = (colorRuta === "#edb900") ? "foot" : "driving";
            // Armamos la URL para pedirle la ruta a la API pública de OSRM
            var osrmUrl = "https://router.project-osrm.org/route/v1/" + perfil + "/" + osrmCoords.join(";") + "?overview=full&geometries=geojson";

            // 3. Consultamos a la API
            fetch(osrmUrl)
                .then(response => response.json())
                .then(data => {
                    if(data.routes && data.routes.length > 0) {
                        // Si OSRM nos devuelve la geometría de la calle, la dibujamos
                        var rutaReal = L.geoJSON(data.routes[0].geometry, {
                            style: function() {
                                return {
                                    color: colorRuta,
                                    weight: 5,
                                    opacity: 0.8,
                                    dashArray: (colorRuta === "#edb900") ? '10, 10' : ''
                                };
                            }
                        });
                        capaRutas.addLayer(rutaReal);
                        map.fitBounds(rutaReal.getBounds(), {padding: [30, 30]});
                    } else {
                        dibujarRectaFallback(puntosLeaflet, colorRuta);
                    }
                })
                .catch(error => {
                    // Si falla el internet o la API, dibujamos la línea recta chueca de emergencia
                    console.log("OSRM falló, dibujando recta...", error);
                    dibujarRectaFallback(puntosLeaflet, colorRuta);
                }
            );
        }

        // Función de emergencia por si no hay internet (dibuja la línea recta clásica)
        function dibujarRectaFallback(puntos, color) {
            var linea = L.polyline(puntos, {
                color: color,
                weight: 5,
                opacity: 0.8,
                lineJoin: 'round',
                dashArray: (color === "#edb900") ? '10, 10' : ''
            });
            capaRutas.addLayer(linea);
            map.fitBounds(linea.getBounds());
        }

        // Función para borrar las rutas anteriores cuando el usuario hace una nueva búsqueda
        function limpiarMapaDesdeJava() {
            capaRutas.clearLayers();
        }



</script>
</body>
</html>
